apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: microservices
  labels:
    app: eureka
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: eureka:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: microservices
  labels:
    app: eureka
spec:
  type: ClusterIP
  selector:
    app: eureka
  ports:
    - name: http
      port: 8761
      targetPort: 8761